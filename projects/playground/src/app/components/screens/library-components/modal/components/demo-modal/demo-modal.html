<div *appModalHeader>
    {{ data.title }}
</div>

<div class="demo-modal-content-class" [ngClass]="{
    'side-modal': isSideModal(), 
    'center-modal': isCenteredModal() }">
    <div>
        {{ data.body }}
    </div>
</div>

<div class="button-container" *appModalFooter>
    <bx-button (click)="confirm()" variant="success" [text]="'Confirm'" />
    <bx-button (click)="close()" variant="danger" [text]="'Cancel'" />
</div>
