<div class="actions-area">
    <button bx-button [bxDropdown]="themeMenu" placement="bottom" variant="filled" color="grayscale" [outlined]="true"
        class="theme-select-trigger" [bxTooltip]="'Choose a Theme'">
        {{ selectedThemeLabel() }}
        <bx-icon name="chevron-down" class="bx-icon-pos-end" size="16" />
    </button>

    <ng-template #themeMenu>
        <bx-menu>
            @for(theme of availableThemes; track theme.id) {
            <bx-menu-item [label]="theme.label" [icon]="selectedThemeId() === theme.id ? 'check' : undefined"
                (action)="onThemeChange(theme.id);">
            </bx-menu-item>
            }
        </bx-menu>
    </ng-template>

    <button bx-button (click)="toggleTheme()" variant="mini-fab" color="grayscale" [outlined]="true"
        [attr.aria-label]="isDarkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'" class="theme-toggle">
        <bx-icon [name]="isDarkMode() ? 'sun' : 'moon'" />
    </button>
</div>


<div class="app-container">
    <app-sidenav [title]="'Blocks'"></app-sidenav>
    <div class="app-content-container">
        <router-outlet></router-outlet>
    </div>
</div>
