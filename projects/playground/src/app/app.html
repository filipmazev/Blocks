<div class="actions-area">
    <div class="select-wrapper theme-select">
        <select [ngModel]="selectedThemeId()" (ngModelChange)="onThemeChange($event)">
            @for(theme of availableThemes; track theme.id) {
            <option [value]="theme.id">{{ theme.label }}</option>
            }
        </select>
    </div>

    <button bx-button (click)="toggleTheme()" variant="mini-fab" color="grayscale" [outlined]="true"
        [attr.aria-label]="isDarkMode() ? 'Switch to Light Mode' : 'Switch to Dark Mode'" class="theme-toggle">
        <bx-icon [name]="isDarkMode() ? 'sun' : 'moon'" />
    </button>
</div>


<div class="app-container">
    <app-sidenav [links]="navLinks()" [title]="'Blocks'"></app-sidenav>
    <div class="app-content-container">
        <router-outlet></router-outlet>
    </div>
</div>
