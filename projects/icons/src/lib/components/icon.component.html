<span class="icon" [style.inline-size]="resolvedSize()" [style.block-size]="resolvedSize()"
    [class.has-bg]="!!resolvedBgColor()" [style.color]="resolvedColor()" [attr.role]="decorative() ? null : 'img'"
    [style.background-color]="resolvedBgColor()" [attr.aria-hidden]="decorative() ? 'true' : null"
    [attr.aria-label]="decorative() ? null : ariaLabel()" [innerHTML]="svg()"></span>
